name: CI

on:
  workflow_dispatch:
    inputs:
      run_integration_hooks_remediation:
        description: "Run optional hooks remediation integration test"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
      - codex/world-class-stability-hardening
  pull_request:

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Smoke test
        run: bun run smoke-test

  package-dry-run:
    name: package dry-run
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package (dry run)
        run: bun publish --dry-run

  integration-hooks-remediation:
    needs: package-dry-run
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.run_integration_hooks_remediation == true || inputs.run_integration_hooks_remediation == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check pi CLI availability
        id: pi
        shell: bash
        run: |
          if command -v pi >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping integration-hooks-remediation-test because 'pi' is not installed on this runner."
          fi

      - name: Integration hooks remediation test
        if: ${{ steps.pi.outputs.available == 'true' }}
        run: bun run integration-hooks-remediation-test -- --timeoutSec 180
